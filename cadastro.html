<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBooks | Cadastro</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <h1 class="logo-titulo">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icone-logo">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            MyBooks
        </h1>
        <nav aria-label="Navegação Principal">
            <ul>
                <li><a href="/index.html">Início</a></li>
                <li><a href="/cadastro.html" aria-current="page">Cadastrar Livro</a></li>
                <li><a href="/historico.html">Meu Histórico</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Adicionar Novo Livro</h2>
            <p>Preencha as informações básicas para registrar uma nova obra no seu acervo.</p>
            
            <form id="form-livro">
                <fieldset>
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" required>

                    <label for="autor">Autor</label>
                    <input type="text" id="autor" name="autor" required>

                    <label for="ano">Ano de Publicação</label>
                    <input type="number" id="ano" name="ano" min="1000" max="2026" required>
                </fieldset>

                <button type="submit" class="btn-primario">Salvar Livro</button>
                <p id="msg-status" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MyBooks - Pedro & Léo & Edu</p>
    </footer>

    <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
